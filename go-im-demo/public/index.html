<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go IM 聊天</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .header {
            background: #667eea;
            color: #fff;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 20px; }
        .header p { margin: 0; }
        .header button {
            background: #e74c3c;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
        }
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .sidebar {
            width: 220px;
            background: #f8f9fa;
            border-right: 1px solid #ddd;
            padding: 15px;
            overflow-y: auto;
        }
        .sidebar h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 5px;
        }
        .sidebar ul {
            list-style: none;
            padding: 0;
        }
        .sidebar li {
            padding: 8px 0;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #555;
        }
        .online-count {
            font-size: 14px;
            color: #27ae60;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
        }
        .message-bubble {
            max-width: 70%;
            margin-bottom: 12px;
            padding: 10px 15px;
            border-radius: 18px;
            word-wrap: break-word;
            line-height: 1.4;
            position: relative;
        }
        .message-bubble.mine {
            align-self: flex-end;
            background: #667eea;
            color: #fff;
        }
        .message-bubble.other {
            align-self: flex-start;
            background: #fff;
            color: #333;
            border: 1px solid #ddd;
        }
        .message-bubble .sender {
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
        }
        .message-bubble .content {
            font-size: 16px;
        }
        .message-bubble .time {
            font-size: 11px;
            color: rgba(255,255,255,0.7);
            margin-top: 4px;
            text-align: right;
        }
        .message-bubble.other .time {
            color: #999;
        }
        .input-area {
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }
        .input-area input[type="text"] {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            font-size: 15px;
        }
        .input-area button {
            padding: 10px 20px;
            background: #667eea;
            color: #fff;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 15px;
        }
        .input-area button:hover {
            background: #5a6fd6;
        }
        #targetUser {
            width: 150px;
        }
    </style>
</head>
<body>
<div class="header">
    <div>
        <h1>💬 Go IM Demo</h1>
        <p>当前用户：<span id="currentUserDisplay"></span></p>
    </div>
    <button onclick="disconnect()">退出</button>
</div>
<div class="container">
    <div class="sidebar">
        <h3>在线用户</h3>
        <p class="online-count" id="onlineCount">0 人在线</p>
        <ul id="onlineUsers"></ul>
    </div>
    <div class="chat-area">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="targetUser" placeholder="对方用户名">
            <input type="text" id="msgInput" placeholder="输入消息...">
            <button onclick="sendMsg()">发送</button>
            <button onclick="loadHistory()">历史</button>
        </div>
    </div>
</div>
<script src="static/app.js"></script>
</body>
</html>
