version: "3.8"
services:
  mysql:
    image: mysql:8.0
    container_name: im-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: im
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: im-redis
    restart: always
    ports:
      - "6379:6379"

  app:
    build: .
    container_name: im-app
    restart: always
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USER: root
      MYSQL_PASSWORD: "123456"
      MYSQL_DB: im
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data: